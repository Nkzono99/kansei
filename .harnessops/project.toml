schema_version = "0.1"
layout_version = "0.1"

[project]
name = "kansei"
root = "."
kind = "target-repository"

[profile]
id = "target-harness"
version = "0.1.0"
source = "builtin"
adapter = "generic_code"

[overlay]
mode = "upstream-lab"
path = "harness-lab"
managed_by = "harnessops"

[privacy]
default_visibility = "private-until-sanitized"

[agents]
codex = true
claude = true

[target_harness]
provider = "target-harness"
manifest = ".harness/manifest.toml"
